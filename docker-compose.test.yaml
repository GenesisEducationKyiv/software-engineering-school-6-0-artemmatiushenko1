services:
  db-test:
    image: postgres:16-alpine
    container_name: github-release-notifier-db-test
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: github_release_notifier_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: github-release-notifier-redis-test
    ports:
      - '6380:6379'

volumes:
  postgres_test_data:
