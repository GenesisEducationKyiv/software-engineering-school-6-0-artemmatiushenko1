filebeat.inputs:
  - type: container
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      # Container input unwraps Docker JSON; message is already Pino JSON
      - decode_json_fields:
          fields: ['message']
          target: ''
          overwrite_keys: true
          add_error_key: true
      # url and service collide with ECS object mappings and cause bulk rejections
      - rename:
          fields:
            - from: url
              to: path
            - from: service
              to: app_name
          ignore_missing: true
          fail_on_error: false
      - drop_fields:
          fields: ['message']
          ignore_missing: true
      - add_docker_metadata:
          host: 'unix:///var/run/docker.sock'
      - drop_event:
          when:
            not:
              equals:
                container.name: 'api'

processors:
  - add_host_metadata: ~

output.elasticsearch:
  hosts: ['http://elasticsearch:9200']
  index: 'github-release-notifier-%{+yyyy.MM.dd}'

setup.template.name: 'github-release-notifier'
setup.template.pattern: 'github-release-notifier-*'
setup.ilm.enabled: false

logging.level: info
logging.to_files: false
logging.to_stderr: true
