services:
  db:
    image: postgres:16-alpine
    container_name: github-release-notifier-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-github_release_notifier}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: github-release-notifier-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI port

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    labels:
      logging_enabled: 'true'
    depends_on:
      - db
      - redis
      - mailpit

  elasticsearch:
    profiles:
      - logging
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: github-release-notifier-elasticsearch
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-changeme}
      xpack.security.enabled: 'true'
      xpack.security.http.ssl.enabled: 'false'
      xpack.security.transport.ssl.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  elasticsearch-setup:
    profiles:
      - logging
    image: curlimages/curl:8.11.1
    container_name: github-release-notifier-elasticsearch-setup
    restart: 'no'
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-changeme}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-changeme}
    command:
      - sh
      - -c
      - |
        echo "Setting kibana_system password..."
        until curl -sf -u "elastic:$$ELASTIC_PASSWORD" \
          -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$$KIBANA_SYSTEM_PASSWORD\"}"; do
          echo "Waiting for Elasticsearch security API..."
          sleep 2
        done
        echo "kibana_system password configured."

  kibana:
    profiles:
      - logging
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: github-release-notifier-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-changeme}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-min-32-char-local-dev-encryption-key!!}
      XPACK_REPORTING_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-min-32-char-local-dev-encryption-key!!}
      XPACK_SECURITY_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-min-32-char-local-dev-encryption-key!!}
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch-setup:
        condition: service_completed_successfully

  filebeat:
    profiles:
      - logging
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: github-release-notifier-filebeat
    user: root
    environment:
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:-changeme}
    command:
      - filebeat
      - run
      - -e
      - --strict.perms=false
      - -E
      - output.elasticsearch.username=elastic
      - -E
      - output.elasticsearch.password=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
